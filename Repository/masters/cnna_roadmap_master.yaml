workflow_policy:
- Workflow: Global no-go guardrail inheritance
  Trigger: Every phase preparation, implementation prompt, code review, object documentation update, closeout, pruning decision, or generated-view refresh.
  Required input: top-level global_no_go_guardrails; active phase scratchpad; proposed module/declaration/object changes; operational vs mirror/non-operational layer classification.
  Required updates: Record that the global guardrails are inherited. Phase-local no_go_guardrails may add stricter local constraints but may not replace, weaken, or scope away the global list. Any exception must be explicitly rejected unless
    it is already allowed by the global rule text and isolated outside the operational path.
  Exit rule: No phase may be implemented or closed unless global_no_go_inheritance is present in its scratchpad record and no local field contradicts the top-level global guardrails.
  Change version: ''
  Change timestamp: ''
  Change class: ''
  Change note: ''
- Workflow: Three-layer versioning policy
  Trigger: Any Lean source change; any YAML planning/register change; or any generator, importer, frontend, PDF/table rendering, navigation, API, or tool-code change.
  Required input: metadata.lean_data_version + metadata.lean_data_timestamp; metadata.planning_data_version + metadata.planning_data_timestamp; metadata.tool_infrastructure_version + metadata.tool_infrastructure_timestamp; change classification
