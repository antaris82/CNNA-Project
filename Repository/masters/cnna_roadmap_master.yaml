    (OpenAI).'
context_class_taxonomy:
- Class: PhaseBase
  Applies to: phase
  Parent class: root
  Meaning: Abstract superclass for all roadmap phases.
  Truth role: No truth role by itself; subclasses determine whether the phase may touch Lean, tooling, documentation, DB or reference material.
  Allowed consumers: Only used by generated validators/tables.
- Class: LeanDerivationPhase
  Applies to: phase
  Parent class: PhaseBase/LeanPhase
  Meaning: Direct Lean mathematical/content derivation phase.
  Truth role: May eventually create or close checked Lean objects, but only after derived-only release evidence.
  Allowed consumers: Lean implementation prompt, object proof dossier, downstream phases after closure.
- Class: LeanRefactorPhase
  Applies to: phase
  Parent class: PhaseBase/LeanPhase
  Meaning: Lean code/API/name/import-surface refactor phase without new mathematical content by itself.
  Truth role: Preserves/reorganizes checked code; does not prove new mathematics unless separately registered.
  Allowed consumers: Build/refactor workflow and later Lean phases after regression checks.
- Class: LeanGovernancePhase
  Applies to: phase
  Parent class: PhaseBase/GovernancePhase
  Meaning: Policy/release/import/consumer-governance phase that controls Lean work but is not itself a Lean theorem.
  Truth role: Planning authority only; must not be cited as mathematical proof.
  Allowed consumers: Implementation prompts and generated validators.
- Class: ReferenceGatePhase
  Applies to: phase
  Parent class: PhaseBase/ComparisonPhase
  Meaning: External established-theory or side-theory comparison/target gate.
  Truth role: Comparison/reference only; never CNNA generator or input.
  Allowed consumers: Scratchpads, review gates and later consistency checks after CNNA-derived data exists.
- Class: ToolInfrastructurePhase
  Applies to: phase
  Parent class: PhaseBase/ToolPhase
  Meaning: Python/YAML/generator/schema/tooling phase.
  Truth role: Generated-secondary tooling; cannot release Lean mathematical claims.
  Allowed consumers: Documentation tool, exporters, future DB mirror.
- Class: DatabaseMirrorPhase
  Applies to: phase
  Parent class: PhaseBase/ToolPhase
  Meaning: Provider-neutral SQL/public-read mirror or frontend publication phase.
  Truth role: Read/query/publication mirror only; not a truth source.
  Allowed consumers: Public API/frontend/review tooling after snapshot/checksum rules.
- Class: GeneratedArtifactPhase
  Applies to: phase
  Parent class: PhaseBase/ToolPhase
  Meaning: PDF/TSV/DOT/README/package generated-output phase.
  Truth role: Rendering/navigation/release packaging only.
  Allowed consumers: Readers, documentation exports, release packages.
- Class: DocumentationPhase
  Applies to: phase
  Parent class: PhaseBase/DocumentationPhase
  Meaning: Human-readable documentation, review matrix, no-infallibility statement, or manual workflow phase.
  Truth role: Interpretive documentation; expert review required.
  Allowed consumers: Reviewers and future tool/database views.
- Class: BaselinePhase
  Applies to: phase
  Parent class: PhaseBase
  Meaning: Frozen baseline or package state phase.
  Truth role: Records baseline identity only.
  Allowed consumers: Regression comparison and package history.
- Class: ObjectBase
  Applies to: object
  Parent class: root
  Meaning: Abstract superclass for all registered objects/quantities/control artifacts.
  Truth role: No truth role by itself; subclasses determine whether the row is Lean, target, tool, DB, reference, generated or governance.
  Allowed consumers: Object register/proofbook validators.
- Class: LeanSourceObject
  Applies to: object
  Parent class: ObjectBase/LeanObject
  Meaning: Object has an existing Lean source/seed or canonical Lean module site.
  Truth role: Potential checked-code object; exact semantic status still governed by Object status and proof dossier.
  Allowed consumers: Lean phases subject to import/consumer discipline.
- Class: LeanTargetObject
  Applies to: object
  Parent class: ObjectBase/LeanObject
  Meaning: Planned or future Lean object/candidate, not a checked final object yet.
  Truth role: Target only until implemented and proof-checked.
  Allowed consumers: Planning/proof rehearsal; not public-final.
- Class: LeanRefactorObject
  Applies to: object
  Parent class: ObjectBase/LeanObject/RefactorObject
  Meaning: Lean-facing refactor, notation, facade, quarantine or import-surface object. It may point to Lean modules, but its semantic role is reorganization/compatibility rather than new mathematics.
  Truth role: Code-shape object only; preserves or exposes checked code and must not be cited as a new derived mathematical theorem.
  Allowed consumers: Lean refactor phases, regression checks and downstream phases after build-compatible migration evidence.
- Class: LeanHandoffContractObject
  Applies to: object
  Parent class: ObjectBase/LeanObject/ContractObject
  Meaning: Lean-facing handoff/input/output contract object. It controls access between pillars or phase layers and may have a Lean target module, but it is not itself the mathematical data transported by the handoff.
  Truth role: Interface/consumer-rights object; downstream phases may consume only the separately registered LeanSourceObject or LeanTargetObject data named by the contract.
  Allowed consumers: Handoff validators, pillar-boundary phases and later Lean phases subject to access rights.
- Class: LeanGovernanceObject
  Applies to: object
  Parent class: ObjectBase/LeanObject/GovernanceObject
  Meaning: Lean-facing policy/audit object whose natural representation may be a Lean module or proof-carrying record, while the content remains governance rather than mathematical CNNA data.
  Truth role: Checked governance/audit boundary if implemented; never a substitute for a derived mathematical object.
  Allowed consumers: Static audits, import/consumer discipline, release gates and implementation prompts.
- Class: GovernancePolicyObject
  Applies to: object
  Parent class: ObjectBase/GovernanceObject
  Meaning: Policy, ledger, guardrail, release, import or consumer-control object.
  Truth role: Controls work; does not constitute mathematical CNNA data.
  Allowed consumers: Implementation prompts, validators and review checklists.
- Class: ReferenceGateObject
  Applies to: object
  Parent class: ObjectBase/ComparisonObject
  Meaning: External theory/reference/comparison/target-gate object.
  Truth role: Comparison-only; never ontic or generative CNNA input.
  Allowed consumers: Scratchpads and later consistency gates after CNNA-derived objects exist.
- Class: ToolInfrastructureObject
  Applies to: object
  Parent class: ObjectBase/ToolObject
  Meaning: YAML/schema/script/export/tooling object.
  Truth role: Generated-secondary/tooling; cannot be mistaken for Lean object.
  Allowed consumers: Documentation tool and future database importer.
- Class: DatabaseMirrorObject
  Applies to: object
  Parent class: ObjectBase/ToolObject
  Meaning: Provider-neutral SQL/frontend/read-only mirror object.
  Truth role: Publication/query mirror only; never Lean/YAML truth replacement.
  Allowed consumers: Public read-only API/frontend/review tooling.
- Class: GeneratedArtifactObject
  Applies to: object
  Parent class: ObjectBase/ToolObject
  Meaning: PDF/TSV/DOT/README/package output or generated rendering contract.
  Truth role: Rendering/navigation artifact; semantically reviewable and secondary.
  Allowed consumers: Readers and release packages.
- Class: DocumentationObject
  Applies to: object
  Parent class: ObjectBase/DocumentationObject
  Meaning: Documentation/review statement or expert-review object.
  Truth role: Interpretive; expert review remains required.
  Allowed consumers: Reviewers and documentation slices.
- Class: LifecycleGovernanceObject
  Applies to: object
  Parent class: GovernancePolicyObject
  Meaning: An object whose content governs object currency, supersession, rename/delete history, successor pointers and historical provenance.
  Truth role: planning/tooling governance; not Lean truth and not a CNNA generator
  Allowed consumers: Explorer schema, SQL mirror, history timeline, object register/proofbook generators and review workflows
- Class: LegacyCodeReferencePhase
  Applies to: Phases
  Parent class: ReferenceGatePhase
  Meaning: Phase that scans or migrates uploaded legacy code as reference/migration evidence only.
  Truth role: 'Secondary code-evidence layer: useful for target gates and regression ideas, but not CNNA truth and not direct Lean-source authority.'
  Allowed consumers: Planning, Explorer, future migration phases and expert review; Lean consumers only after a derived-only source map and new CNNA implementation exist.
- Class: LegacyCodeReferenceObject
  Applies to: Objects
  Parent class: ReferenceGateObject
  Meaning: Object/ledger recording legacy-code structures, migration dispositions, risks or regression targets.
  Truth role: Reference/migration object, never a CNNA-derived theorem/object by itself.
  Allowed consumers: Planning, Explorer, migration ledgers and review. CNNA Lean phases may consume only its audited target obligations, not its legacy code as source.
object_significance_taxonomy:
- Tier: F0
  Name: fundamental
  Applies to: object, phase
  Meaning: Ontic, generator, handoff, invariant, or root-contract level. Failure changes the meaning of the derived-only architecture or a pillar boundary.
  Documentation requirement: 'Full dossier required before promotion or consumption: definition, natural provenance, exact source objects, proof target, proof sketch, verification/audit, consumer rights, and semantic uncertainty.'
  Promotion / demotion rule: May not be promoted by generated prose or status color. Must cite checked Lean code or an explicit governance contract and must remain expert-reviewable.
- Tier: F1
  Name: core
  Applies to: object, phase
  Meaning: Core derived object, API seam, comparison gate, or proof route that many later phases depend on, but not itself an ontic root.
  Documentation requirement: 'Extended dossier: definition, source chain, main lemmas/proof obligations, dependency risks, and downstream consumers. Enough detail for later implementation without re-reading chat history.'
  Promotion / demotion rule: May be promoted to F0 only if it becomes a pillar-boundary or generator-level contract; may be demoted only after no downstream dependency relies on it.
- Tier: F2
  Name: standard
  Applies to: object, phase
  Meaning: Ordinary derived object, target object, or reference/comparison profile with local but real mathematical or planning relevance.
  Documentation requirement: 'Standard dossier: short definition, source objects, proof target, implementation location, and next documentation action. No large narrative unless it blocks implementation.'
  Promotion / demotion rule: Promote to F1 if several later phases consume it, if it crosses a handoff/API boundary, or if an expert-review risk is discovered.
- Tier: F3
  Name: auxiliary
  Applies to: object, phase
  Meaning: Support, migration, tooling, generated artifact, ledger, or narrow refactor helper. Important for auditability but not a mathematical generator.
  Documentation requirement: 'Compact record: what exists, why it exists, owning phase, source location, and whether it may affect Lean objects. Avoid proofbook bloat.'
  Promotion / demotion rule: Promote to F2/F1 only if it starts carrying semantic proof obligations or becomes a required release gate.
- Tier: F4
  Name: mention-only
  Applies to: object, phase
  Meaning: Trivial, navigational, future-side, purely illustrative, or low-risk reference row. It should be visible but not exhaustively documented.
  Documentation requirement: 'Mention and pointer only: name, context class, status, and reason for non-consumption. No full proof dossier unless promoted.'
  Promotion / demotion rule: Automatically promote if it becomes a dependency, is consumed by Lean code, controls access/release, or carries a reference-theory risk.
lean_declaration_classification_taxonomy:
- Axis: declaration_kind
  Code: def
  Name: Definition
  Meaning: Lean definition or constant-producing definition.
  Assignment rule: Read from parsed Lean declaration/inventory, not inferred only from filename.
  Closure rule: Must be paired with semantic_role, triviality_tier, lifecycle_state, owner bucket and documentation policy.
- Axis: declaration_kind
  Code: theorem
  Name: Theorem
  Meaning: Named theorem declaration.
  Assignment rule: Read from source/inventory declaration kind.
  Closure rule: May be trivial syntactically yet high-significance semantically; require override channel.
- Axis: declaration_kind
  Code: lemma
  Name: Lemma
  Meaning: Named lemma declaration.
  Assignment rule: Read from source/inventory declaration kind.
  Closure rule: Same classification burden as theorem; local helper status must be explicit.
- Axis: declaration_kind
  Code: structure
  Name: Structure
  Meaning: Lean structure/class-like record declaration when parsed as structure.
  Assignment rule: Read from source/inventory declaration kind.
  Closure rule: Must distinguish fundamental object carrier from ledger/scaffold/overhead record.
- Axis: declaration_kind
  Code: class
  Name: Typeclass
  Meaning: Lean class/typeclass declaration.
  Assignment rule: Read from source/inventory declaration kind.
  Closure rule: Must state whether operational, mirror-only, legacy, external assumption, or refactor target.
- Axis: declaration_kind
  Code: inductive
  Name: Inductive
  Meaning: Inductive type declaration.
  Assignment rule: Read from source/inventory declaration kind.
  Closure rule: Constructors and generated recursors may be bucketed separately or inherited with explicit rule.
- Axis: declaration_kind
  Code: abbrev
  Name: Abbreviation
  Meaning: Lean abbreviation/alias.
  Assignment rule: Read from source/inventory declaration kind.
  Closure rule: Must distinguish harmless alias, legacy facade, renamed alias or public API surface.
- Axis: declaration_kind
  Code: instance
  Name: Instance
  Meaning: Typeclass instance declaration.
  Assignment rule: Read from source/inventory declaration kind.
  Closure rule: Must state whether it affects operational path, mirror path, classical/noncomputable exposure or only tooling.
- Axis: declaration_kind
  Code: notation-syntax-macro
  Name: Notation/syntax/macro
  Meaning: Notation, syntax, macro or parser-level declaration.
  Assignment rule: Read from source/inventory and notation module scan.
  Closure rule: Must be classified as API, legacy/phase alias, notation core, or quarantine candidate.
- Axis: declaration_kind
  Code: namespace-only
  Name: Namespace-only surface
  Meaning: Namespace/opening organization without direct mathematical object payload.
  Assignment rule: Detected from source structure; not counted as derived mathematical object.
  Closure rule: May be mention-only but still needs owner bucket and lifecycle state.
- Axis: declaration_kind
  Code: attribute-config
  Name: Attribute/configuration
  Meaning: Attribute, option, lint/config or generated declaration-control surface.
  Assignment rule: Detected from source or tool inventory.
  Closure rule: Must be checked against operational no-go rules such as no operational @[simp].
- Axis: declaration_kind
  Code: example-test-eval
  Name: Example/test/eval
  Meaning: 'Example, smoke-test evaluator, #eval-facing declaration or test-only artifact.'
  Assignment rule: Detected from source/inventory and module path, with manual override where path is misleading.
  Closure rule: Must not be promoted to core object without explicit producer/consumer and proof-dossier upgrade.
- Axis: declaration_kind
  Code: unknown-manual-review
  Name: Unknown/manual review
  Meaning: Temporary classification for declarations the scanner cannot type safely.
  Assignment rule: Only allowed as open audit residue, never as closed source-intake evidence.
  Closure rule: Blocks LEG37/CEX0 closure until resolved or explicitly bucketed with a justified non-object status.
- Axis: semantic_role
  Code: core-computational
  Name: Core computational declaration
  Meaning: Participates in computable/operational construction path.
  Assignment rule: Evidence must come from actual dependency/consumer path, not only module name.
  Closure rule: Requires documentation policy at least standard unless triviality/significance override justifies compact record.
- Axis: semantic_role
  Code: proof-bridge
  Name: Proof bridge
  Meaning: Connects definitions/theorems or transports evidence across layers.
  Assignment rule: Identify by use in proof targets and consumers.
  Closure rule: May be T2/T3 but must preserve source/target theorem semantics.
- Axis: semantic_role
  Code: structural-constructor
  Name: Structural constructor
  Meaning: Builds an entry/ledger/object/certificate structure.
  Assignment rule: Identify constructor/projection role explicitly.
  Closure rule: Must distinguish natural-origin structure from consumer-side patch.
- Axis: semantic_role
  Code: projection-wrapper
  Name: Projection/wrapper
  Meaning: Definitional wrapper, projection, accessor or compatibility facade.
  Assignment rule: Detected by body/projection/facade pattern and consumer checks.
  Closure rule: Usually T2/T3, but can be high-significance when it is a boundary/handoff contract.
- Axis: semantic_role
  Code: public-api
  Name: Public API surface
  Meaning: Declaration intentionally exposed to downstream consumers.
  Assignment rule: Requires public-surface whitelist or object/phase evidence.
  Closure rule: Must have consumer rights and documentation policy; blue/legacy rows cannot be public-final.
- Axis: semantic_role
  Code: legacy-status
  Name: Legacy status enum/marker
  Meaning: Legacy single-constructor/status gate or historical phase marker.
  Assignment rule: Detected by status-gate quarantine and source scan.
  Closure rule: Quarantined or compact-record unless still consumed by current public API.
- Axis: semantic_role
  Code: legacy-policy
  Name: Legacy policy/facade
  Meaning: Old policy/facade retained for compatibility.
  Assignment rule: Detected by lifecycle/renaming/refactor map.
  Closure rule: Must point to successor/current object or explicit retirement.
- Axis: semantic_role
  Code: phase-alias
  Name: Phase alias/name residue
  Meaning: Declaration or module name that carries phase semantics rather than neutral object semantics.
  Assignment rule: Detected by naming scan and manual review.
  Closure rule: Must be neutralized, quarantined or documented as historical facade before new substantive code.
- Axis: semantic_role
  Code: audit-only
  Name: Audit-only declaration
  Meaning: Exists for inventory, check, report or governance only.
  Assignment rule: Evidence from module path plus usage; manual override required if used mathematically.
  Closure rule: Not a Lean mathematical object for CNNA truth; mention-only/compact documentation.
- Axis: semantic_role
  Code: generated-artifact
  Name: Generated artifact
  Meaning: Output generated from YAML/inventory/tooling, not manually maintained Lean truth.
  Assignment rule: Trace to generator snapshot and source hash.
  Closure rule: Must never be cited as primary Lean truth.
- Axis: semantic_role
  Code: external-reference-marker
  Name: External reference marker
  Meaning: Established-theory/reference/comparison marker.
  Assignment rule: Blue/reference source provenance required.
  Closure rule: May guide target gates but cannot be imported as CNNA generator.
- Axis: semantic_role
  Code: dead-candidate
  Name: Dead candidate
  Meaning: Unused, obsolete or negative-path candidate kept for history.
  Assignment rule: Requires no-current-consumer or supersession evidence.
  Closure rule: Must have lifecycle state deprecated/superseded/deleted-retired or explicit legacy facade.
- Axis: semantic_role
  Code: unknown-manual-review
  Name: Unknown/manual review
  Meaning: Temporary unresolved semantic role.
  Assignment rule: Only from scanner inability or conflicting evidence.
  Closure rule: Blocks total-classification closure until resolved.
- Axis: triviality_tier
  Code: T0
  Name: Fundamental/nontrivial
  Meaning: Defines or proves a fundamental CNNA object, boundary contract, generator, handoff or nontrivial theorem.
  Assignment rule: Manual/curated evidence may override syntactic simplicity.
  Closure rule: Full dossier/extended proof documentation required; may not be hidden by rfl/body heuristics.
- Axis: triviality_tier
  Code: T1
  Name: Structural local
  Meaning: Nontrivial but local structural construction, lemma family or certificate.
  Assignment rule: Needs local proof/consumer evidence.
  Closure rule: Standard or extended dossier depending on significance.
- Axis: triviality_tier
  Code: T2
  Name: Proof bridge/API wrapper
  Meaning: Bridge, wrapper or API connector with meaningful consumer effect.
  Assignment rule: Auto-candidate by wrapper/proof-bridge role; manual override allowed.
  Closure rule: Compact or standard record; public API requires explicit consumer rights.
- Axis: triviality_tier
  Code: T3
  Name: Definitional/rfl/projection
  Meaning: Mostly definitional equality, projection, alias or rfl-level support.
  Assignment rule: Heuristic candidate from proof body/body shape; not final without override check.
  Closure rule: Mention-only/compact unless it carries boundary/handoff/fundamental semantics.
- Axis: triviality_tier
  Code: T4
  Name: Status/policy/audit marker
  Meaning: Governance marker, status enum, policy row or audit-only declaration.
  Assignment rule: Evidence from source role and no mathematical consumer.
  Closure rule: Compact/mention-only; quarantine if phase-semantic or legacy.
- Axis: triviality_tier
  Code: T5
  Name: Legacy/dead/generated/no semantic payload
  Meaning: Dead, legacy, generated-secondary or no-current-semantic-payload declaration.
  Assignment rule: Requires lifecycle/consumer evidence.
  Closure rule: Exclude from public docs unless referenced; retain history non-destructively.
- Axis: triviality_tier
  Code: T?
  Name: Unresolved triviality
  Meaning: Temporary unresolved triviality classification.
  Assignment rule: Allowed only while source-intake audit is open.
  Closure rule: Blocks LEG37/CEX0 closure.
- Axis: documentation_requirement
  Code: full-dossier
  Name: Full dossier
  Meaning: Complete source/provenance/proof/verification/consumer-rights documentation.
  Assignment rule: Default for T0/F0 or public-final fundamental objects.
  Closure rule: Required before promotion or downstream consumption.
- Axis: documentation_requirement
  Code: extended-dossier
  Name: Extended dossier
  Meaning: Detailed proof route, risks and consumers.
  Assignment rule: Default for F1 and structural/explorer/governance gates.
  Closure rule: Required before activating dependent schema/frontend/import phases.
- Axis: documentation_requirement
  Code: standard-dossier
  Name: Standard dossier
  Meaning: Normal object/proof summary with source and consumer links.
  Assignment rule: Default for T1/T2 non-public-core declarations.
  Closure rule: Enough to avoid re-reading chat history.
- Axis: documentation_requirement
  Code: compact-record
  Name: Compact record
  Meaning: Short record for helpers, policy rows, wrappers, status markers.
  Assignment rule: Allowed for T3/T4/F3 if not public-final core.
  Closure rule: Must still include owner bucket and lifecycle state.
- Axis: documentation_requirement
  Code: mention-only
  Name: Mention only
  Meaning: Visible in generated inventory but no proofbook expansion.
  Assignment rule: Allowed for T4/T5 with no public mathematical consumer.
  Closure rule: Still must be queryable and lifecycle-tagged.
- Axis: documentation_requirement
  Code: exclude-public-unless-referenced
  Name: Exclude unless referenced
  Meaning: Hidden from public/high-level docs unless a selected object/phase references it.
  Assignment rule: Allowed for T5/generated/dead residues.
  Closure rule: Explorer may reveal it through history/provenance filters only.
- Axis: documentation_requirement
  Code: manual-review-required
  Name: Manual review required
  Meaning: Documentation policy cannot be fixed automatically.
  Assignment rule: Used for conflicting classifier evidence.
  Closure rule: Blocks total-classification closure until resolved.
- Axis: lifecycle_state
  Code: current
  Name: Current declaration
  Meaning: Current declaration in the active Lean snapshot.
  Assignment rule: Present in current source and not superseded/retired.
  Closure rule: Must have owner bucket, documentation policy and public-surface status.
- Axis: lifecycle_state
  Code: superseded
  Name: Superseded declaration
  Meaning: Replaced by a newer declaration/object but retained historically.
  Assignment rule: Requires successor pointer and version/timestamp evidence.
  Closure rule: Old row remains; consumers must point to current successor unless explicitly historical.
- Axis: lifecycle_state
  Code: renamed-alias
  Name: Renamed alias
  Meaning: Old name retained as alias/facade after rename.
  Assignment rule: Requires rename map, predecessor/successor and facade policy.
  Closure rule: May not be treated as independent current object.
- Axis: lifecycle_state
  Code: deprecated
  Name: Deprecated declaration
  Meaning: Still present but discouraged or scheduled for quarantine/removal.
  Assignment rule: Requires deprecation reason and consumer audit.
  Closure rule: Public-final use blocked unless explicitly grandfathered.
- Axis: lifecycle_state
  Code: deleted-retired
  Name: Deleted/retired declaration
  Meaning: No longer present in current Lean snapshot but retained in history.
  Assignment rule: Detected by snapshot diff and retirement record.
  Closure rule: Must terminate lifecycle chain without dangling consumers.
- Axis: lifecycle_state
  Code: legacy-facade
  Name: Legacy facade
  Meaning: Compatibility surface retained to avoid breaking old imports.
  Assignment rule: Requires neutral target and facade decommission/review policy.
  Closure rule: Must point to current canonical declaration/object.
- Axis: lifecycle_state
  Code: unknown-manual-review
  Name: Unknown/manual review
  Meaning: Lifecycle cannot be decided from current inventory.
  Assignment rule: Only temporary during diff/source-intake audit.
  Closure rule: Blocks closure until resolved.
- Axis: public_surface_status
  Code: public-final
  Name: Public final
  Meaning: Allowed public/current API declaration.
  Assignment rule: Requires derived/current status, consumer rights and documentation policy.
  Closure rule: Forbidden for blue, unknown, deprecated, superseded or hypothesis-only declarations.
- Axis: public_surface_status
  Code: internal-only
  Name: Internal only
  Meaning: Usable only inside the allowed internal source layer.
  Assignment rule: Default for helpers and operational internals unless promoted.
  Closure rule: Explorer may display but must not advertise as public API.
- Axis: public_surface_status
  Code: facade-only
  Name: Facade only
  Meaning: Compatibility alias/wrapper, not canonical current object.
  Assignment rule: Requires successor/current target.
  Closure rule: Consumer docs must point to canonical target.
- Axis: public_surface_status
  Code: audit-only
  Name: Audit only
  Meaning: Inventory/governance/testing declaration with no API role.
  Assignment rule: Requires no mathematical consumer or explicit audit purpose.
