secondary_long_term_goals:
- ID: SLTG-01
  Goal: Semi-automated documentation of existing Lean code inside the same planning/proofbook tool.
  Motivation: The Bestandscode cannot be fully normalized at once, but every module, declaration family, object, proof bridge, and consumer path can be documented with the same YAML/proof-dossier infrastructure so later interpretation is minimized.
  Vision: 'Existing Lean-code documentation should grow into a reviewable object universe: each missing object/quantity becomes a dossier-backed node that can be inspected by the relevant expert without reading the full repository.'
  Raw data / tools: repo_inventory/raw_export modules.json, import_edges.json, symbol_reference_summary.json, dependency_order, mainline forensics, object register, proof dossiers, implementation scratchpad.
  Operational scope: 'Secondary workflow: document existing code and its true consumers while Phase 1.x cleans the public API. It does not authorize refactors or deletion by itself.'
  Not-before gate: After Phase 1.1.1.1.4 declaration consumption classification and initial proof-dossier infrastructure are closed; deeper execution after Phase 1.1.5 import firewall is green.
  Derived-only boundary: Documentation may classify provenance and consumers; it may not turn graph metadata into CNNA-generative assumptions.
  Plan action: Add Phase 19.1 and object LEG16; use the generated Lean module graph to prevent forgotten code/documentation gaps. V1.12 adds LEG36 so existing-code documentation also records semantic consolidation/no-merge candidates before new
    substantive code.
- ID: SLTG-02
  Goal: Derivation-graph geometry of the formalized theory.
  Motivation: 'The repository already contains graph-theoretic data: import graph, dominators, layer decomposition, source-sink signal paths, and robust semantic mainline. These can later expose bottlenecks, weak derivation edges, and discipline
    clusters.'
  Vision: A later graph/database layer can provide semantic zoom from pillars to phases, modules, declarations, objects, proof dossiers, and theorem sites; the graph remains a diagnostic/evidence map, not a generator.
  Raw data / tools: import_edges.json, dominator analysis, layer decomposition, source-to-sink paths, module group graph, architectural core summary, mainline forensics.
  Operational scope: Secondary research/diagnostic layer only. Use it to understand theory organization and proof pressure after core derivations are stable.
  Not-before gate: After the neutral API, generator governance, object proof dossiers, and main operational arithmetic/DtN paths have stabilized; not before active Phase 1.x cleanup.
  Derived-only boundary: Graph geometry can suggest audits and consistency checks but cannot supply mathematical axioms, stochasticity, open-system behavior, or physical interpretation.
  Plan action: Add Phase 19.2 and object LEG17; render/import future graph metrics such as dominators, cuts, signal-path depth, cluster boundaries, and optional Cheeger-style diagnostics as comparison metadata.
- ID: SLTG-03
  Goal: Formal emergence-path forensics for open-system dynamics inside the derivation network.
  Motivation: Later, once Pillar A/C objects are derived, the proof/module graph may help locate where closed finite subsystem assumptions become open effective dynamics through boundary/complement/regime handoffs.
  Vision: When A/C open-system paths exist, graph forensics can show where regime, complement, boundary, and handoff structures make openness visible, but the dynamics must still be derived in Lean-facing CNNA objects.
  Raw data / tools: A-regime profiles, complement-family profiles, DtN/Schur handoff modules, C/OQS consumer path, source-sink paths, dominator/cut analysis, object proof dossiers.
  Operational scope: Post-core analysis of the formalization topology; not a replacement for deriving open-system behavior inside CNNA.
  Not-before gate: After A regime/complement path, A->C handoff, and C OQS consumer roadmaps have enough checked objects to analyze. Treat as bonus/secondary until then.
  Derived-only boundary: Emergence claims must still be proved from CNNA objects; graph forensics only localize proof paths, bottlenecks, and structural analogies.
  Plan action: Add Phase 19.3 and object LEG18; keep as black/secondary target until the relevant A/C derivations exist.
- ID: SLTG-04
  Goal: Reflective comparison between CNNA object-structure and formalization-structure.
  Motivation: If the formal derivation graph later exhibits structural features resembling CNNA objects - layering, boundary cuts, operators on graphs, signal flow, modular clusters - this should be studied as a meta-level observation, not as
    a premise.
  Vision: 'The tool may be read as a meta-level interface analogue: one active cursor/bright object is examined against the large Lean-code complement; this is an operational review metaphor, not a CNNA theorem.'
  Raw data / tools: discipline subgraphs for Dirichlet/DtN/Schur, prenumerical/ToC/Substrate, Topology/Algebra/CD; module clusters; graph cuts; source-sink paths; proof-dossier links.
  Operational scope: Far-target meta-analysis and visualization after mathematical closure. It may produce diagnostics, figures, and research notes, not new CNNA base assumptions.
  Not-before gate: Only after core derived objects, public API, and consumer handoffs are stable enough that graph measurements are meaningful.
  Derived-only boundary: Strictly comparison/diagnostic. Any apparent self-similarity between theory and formalization remains an observation unless separately formalized and proved.
  Plan action: Add Phase 19.4 and object LEG19; keep outside the active implementation path.
- ID: LT5
  Goal: Thread/full-boundary derivation-geometry and string-analogy diagnostics
  Motivation: The IdealThread/full-cut extrema may later illuminate how one-dimensional recursive routes sit inside full boundary/operator geometry and how open-system behavior emerges from complement/interface structure.
  Vision: Future string-analogy diagnostics may use derivation geometry as a comparison map around the thread/full-boundary extrema, only after the underlying route is derived and reviewed.
  Raw data / tools: IdealThread/CutSpec.full profiles; import graph; derivation graph; Schur/DtN route audit; proof dossiers; source-sink paths and dominators.
  Operational scope: Secondary diagnostic/comparison study only, after the underlying CNNA objects are code-derived and public-final.
  Not-before gate: After S07, S08, BR06, BR07, S05/S06, and the relevant arithmetic/number-theory proof dossiers are closed.
  Derived-only boundary: The diagnostic may compare formalization geometry to CNNA objects but cannot feed back as a generative axiom, formula, or shortcut.
  Plan action: Keep as Phase 19.5 side-road; do not block active Phase 1 cleanup or Phase 3/4 neutralization.
- ID: SLTG-06
  Goal: Database-ready CNNA Explorer and review/documentation structure
  Motivation: A database-backed representation is likely the most effective path for querying, analyzing, visualizing, sharing, online display, interactive exploration, and discipline-separated expert review of the CNNA object world.
  Vision: 'Long-term vision: a custom CNNA Explorer that starts as a dark, SQL/YAML-driven, visual research interface over the Single-YAML-Master mirror and can gradually grow into a Universe Explorer. The user-facing surface should support Pillar
    hubs, graph navigation, right-side inspectors, filters by context/theme/phase/object/module/status/edge semantics, history timelines, multilingual descriptions, hypothesis tracking and later lab views. The explorer remains generated-secondary:
    Lean code is the primary truth system, YAML is the curated semantic mirror, SQL is a read-only presentation mirror.'
  Raw data / tools: Single YAML master, generated TSV/JSON/DOT/PDF views, phase/object/proof-dossier records, module inventory, status legends, local theory context ledger, end-theory comparison ledger, future relational or graph database export.;
    future GitHub Actions artifacts; snapshot_manifest.json; Webhosting-local MySQL importer; SQL dumps/local archives
  Operational scope: Main side objective Phase 20 plus dedicated CNNA Explorer main block Phase 21. Phase 21.0 must close the completeness/coherence/refactor/source-inventory audit before Explorer schema, SQL importer or frontend implementation
    are treated as stable.
  Not-before gate: Principles apply immediately. Technical database export follows after YAML schema and generated views are stable enough for round-trip-safe identifiers and review links. Public deployment additionally requires backup/rollback
    evidence, read-only API tests and validated staging/current import.
  Derived-only boundary: The database is a documentation/review/query layer. It may expose, analyze, and visualize Lean/YAML-derived metadata, but it cannot supply CNNA-generative axioms, formulas, physics, stochasticity, or established-theory
    inputs.
  Plan action: 'P1.37 sharpens Phase 21 with 21.2.1-21.2.3: GitHub backup-gated PR automation, CI build/snapshot artifacts, and Webhosting-local MySQL staging/import/swap/rollback. The database remains read-only/generated-secondary and cannot
    replace Lean/YAML truth.'
- ID: SLTG-07
  Goal: Geometric-algebra comparison map for later CNNA-derived algebraic and spacetime structures
  Motivation: Quaternion/Pauli/Clifford/geometric-algebra literature provides compact target profiles for rotations, bivectors, pseudoscalars, Clifford signatures and possible spacetime/conformal comparison layers.
  Vision: After CNNA derives relevant CD, boundary-algebra, AQFT/spacetime or side-comparison outputs, the tool can generate a review map showing which GA targets are matched, failed or not yet meaningful.
  Raw data / tools: Horn 0709.2238v1, Hestenes references, mathlib Quaternion/CliffordAlgebra docs, Wieser/Song Lean GA formalization, proof dossiers GA0-GA6.
  Operational scope: Long-term comparison/review map only; no foundation, no phase release, no Lean generator input.
  Not-before gate: After GA0-GA6 predecessor phases expose CNNA-derived candidate data; especially CD reintegration and Pillar-B boundary/local-net phases.
  Derived-only boundary: GA references remain blue/reference material. A target match is evidence of compatibility, not a source of truth; a mismatch must be recorded rather than patched at the consumer.
  Plan action: V1.25 adds phases 1.4.9.*, 13.2.1, 13.6.1 and 18.5 plus objects GA0-GA6.
phase_object_link_policy:
- Kind: direct
  Meaning: Phase directly owns registered object(s).
  Required evidence: At least one object has Phase exactly equal to the phase id.
  Rendering rule: Render direct object hyperlinks. Do not aggregate child phase objects as direct ownership.
- Kind: scope_only
  Meaning: Phase is an umbrella/routing/scope phase; objects are owned by child phases.
  Required evidence: No direct objects and at least one descendant phase has direct object(s).
  Rendering rule: Render scope-only plus a bounded child-object summary.
- Kind: no_direct_object
  Meaning: Phase intentionally has no direct object, e.g. baseline, audit, closeout, generator/view infrastructure without object ownership.
  Required evidence: No direct objects and no descendant-object ownership needed for the phase semantics, plus explanation.
  Rendering rule: Render no direct object with reason; never leave cell blank.
- Kind: moved
  Meaning: Historical placeholder or routing note whose active objects are owned elsewhere.
  Required evidence: Main goal/definition/proof goal identifies the destination phase or ownership move.
  Rendering rule: Render moved placeholder and reason/destination; no direct object links unless the placeholder also owns an explicit audit object.
global_postulates:
- ID: POST1
  Postulate: CNNA ontic subsystem-minimality
  Precise formulation: 'The only primitive ontic emergence trigger is subsystem-being: the selection of a finite or local subsystem, cut, or approximant inside the formal IDEAL_infty provenance whole. IDEAL_infty is the formal relational/provenance
    background, not a physical dynamics input. All dynamics, spectra, operator algebra, arithmetic, geometry, stochasticity, openness, unitarity claims and physical interpretation must be derived from the subsystem/complement relation and its
    Schur/DtN consequences.'
  Allowed primitive: Subsystem/cut/approximant selection within the formal IDEAL_infty provenance whole.
  Derived-only consequences: boundary; inside/outside distinction; complement families; regime noOuter/HasOuter; Schur/DtN effective operator; spectra; algebra; arithmetic; geometry; dynamics; physics
  Forbidden primitive imports: dynamics; time evolution; stochasticity/noise; environment; geometry/lattice; arithmetic/discriminant; operator algebra; AQFT/physics; Cayley-Dickson structures
  Enforcement: Implemented through LEG35, GNG22, phase 1.1.1.1.0.16, object proof dossiers, scratchpad inheritance, and consumer-phase audits.
- ID: POST2
  Postulate: Root partial order and finite subsystem regime split
  Precise formulation: 'The externally visible CNNA foundation contains no free physical parameters. Its foundation axioms are: (1) there exists a root-based, empty-set-based infinite partial order of nodes and edges; (2) every subsystem selected
    inside this partial order is finite; (2a) exactly when the subsystem is approximated from the root/empty-set branch, the selected system is closed, has no dark/interface contribution and is the only regime eligible for later closed/unitary
    evolution after the corresponding time-evolution operator is derived; (2b) when the subsystem is approximated by any non-root selection, a complement exists and the subsystem is effectively open as a bright/interface/dark split, while the
    total bright+interface+dark structure remains closed.'
  Allowed primitive: Root/empty-set based partial order; finite subsystem selection; formal complement relation induced by non-root subsystem selection.
  Derived-only consequences: closed/root regime; open/non-root regime; bright/interface/dark split; complement visibility; later unitarity/open-system claims only through the regime-specific derivation chain.
  Forbidden primitive imports: free physical parameters in the foundation; pre-assumed stochasticity; pre-assumed spacetime horizon; pre-assumed QFT/AQFT/OQS dynamics; direct unitary/open labels without derived regime evidence.
  Enforcement: 'Source/audit evidence: Astronews CNNA thread page 2, posts #27-#29; especially #29 lines 330-341 in the 2026-05-12 web readout.'
- ID: POST3
  Postulate: Generated-data operational closure requirement
  Precise formulation: Derived-only closure is not achieved by a compiled algebraic skeleton alone. A path may be called derived-only only after the structural skeleton exists, the local proof obligations for its components are discharged, and
    genuine generated data pass through the complete operational smoke path relevant to the claim.
  Allowed primitive: The already accepted CNNA source objects and their proof-carrying/generated operational data path.
  Derived-only consequences: Green closure; arithmetic seed claims; Eisenstein/Gauss/CM-style smoke claims; physics-facing operator or regime claims.
  Forbidden primitive imports: declaring closure from framework shape alone; treating algebraic idle-run success as generated-data validation; marking target-theory resemblance as derived-only evidence.
  Enforcement: 'Source/audit evidence: Astronews CNNA thread page 2, post #27 lines 237-243 in the 2026-05-12 web readout.'
