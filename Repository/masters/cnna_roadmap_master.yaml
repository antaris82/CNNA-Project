guiding_metaphors:
- ID: GM-TOOL-INTERFACE
  Name: Tool-interface principle
  Metaphor: The CNNA tool locally exposes an active phase as a bright object against the complementary rest of the Lean codebase and its still unaudited semantic surroundings.
  Mapping: Bright sector = active phase/current object; dark complement = remaining Lean code, open dependencies, unreviewed theory links, and unaudited semantics; boundary/interface = Master-YAML, status, object register, proof dossiers, module/import
    DAG and later database views; DtN/Schur-like reduction = extraction of relevant dependencies, modules, handoffs and review duties; noise/uncertainty = semantic errors, missing blue markings, incomplete expert review or generated-artifact
    defects; Birdsview = database/DAG/review view over the whole formal project, still secondary.
  Operational consequence: 'Each active phase must make its boundary to the remaining project explicit: dependencies, module interfaces, review duties, blue/reference markings and hidden complement risks must be visible before local closure is
    trusted.'
  Boundary: This is an architecture metaphor for documentation and review practice, not a formal CNNA theorem, not an ontic claim, and not a replacement for Lean-primary verification or expert review.
