name: Copy CNNA snapshots

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/copy-cnna-snapshots.yml'
  pull_request:
    branches: [main]
    paths:
      - '.github/cnna-snapshot-copy-trigger'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: copy-cnna-snapshots
  cancel-in-progress: true

jobs:
  copy:
    runs-on: ubuntu-latest
    steps:
      - name: Check out target main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Check out source repository
        uses: actions/checkout@v4
        with:
          repository: antaris82/antaris82.github.io
          ref: main
          path: source_repo

      - name: Copy snapshot directories and commit
        shell: bash
        run: |
          set -euo pipefail

          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git pull --ff-only origin main

          mkdir -p Snapshots
          for snapshot in 20160710 20260716 20260717; do
            src="source_repo/Sierpinski Tetraeder_PoC/CNNA/Snapshot/${snapshot}"
            dst="Snapshots/${snapshot}"
            test -d "$src"
            rm -rf "$dst"
            cp -a "$src" "$dst"
          done

          rm -rf source_repo
          rm -f .github/workflows/copy-cnna-snapshots.yml

          git add -A
          git diff --cached --check
          git commit -m 'Copy CNNA snapshots 20160710, 20260716, 20260717'
          git push origin HEAD:main
